name: DopoApp
options:
  bundleIdPrefix: app.dopo
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_CFBundleDisplayName: dopo
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: HV398LUQ3Z
    CODE_SIGN_STYLE: Automatic

targets:
  DopoApp:
    type: application
    platform: iOS
    sources:
      # Recursive globs — Shared/ is compiled into BOTH targets so keychain
      # constants (service + access group) can never drift between app and
      # extension.
      - DopoApp
      - Shared
    dependencies:
      - target: DopoShareExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.dopo.DopoApp
        CODE_SIGN_ENTITLEMENTS: DopoApp/DopoApp.entitlements
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: DopoApp/Info.plist
      properties:
        CFBundleDisplayName: dopo
        CFBundleName: DopoApp
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        # Brand typeface (Dopo_Brand_Kit.pdf): Space Mono Bold for the wordmark/
        # display. Theme.swift uses Font.custom("SpaceMono-Bold"); register it here.
        UIAppFonts:
          - SpaceMono-Bold.ttf

  DopoShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - DopoShareExtension
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.dopo.DopoApp.ShareExtension
        CODE_SIGN_ENTITLEMENTS: DopoShareExtension/DopoShareExtension.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: dopo
    info:
      path: DopoShareExtension/Info.plist
      properties:
        CFBundleDisplayName: dopo
        CFBundleName: DopoShareExtension
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              # Accept shared URLs (web links); some apps share URLs as text
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
